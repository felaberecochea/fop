ce_title: "Current exhibition"
ce_intro1: "The 2026 exhibition will be available from 15 May to 15 June 2026."
ce_intro2: "You can view the exhibition at the"
ce_intro3: "Botanic Gardens of Utrecht University."
ce_intro4: "On 12 May, a closing event will take place in De Vagant at Utrecht University (see full address & registration details below).
  The closing event brings together the ideas, questions, and perspectives explored throughout the exhibition.
  It is a moment to reflect on how plant science connects to society, and how researchers and the public can engage more openly with each other."
ce_intro5: "During the event, visitors will have the opportunity to:"

ce_item_1: "Meet some of the researchers, and discuss the themes presented in the posters."
ce_item_2: "Hear from"
ce_item_3: "Dr. Carlijn Lammers,"
ce_item_4: "a plant scientist at Utrecht University, 
  about how her research on the role of plants in shaping dune landscapes along the Dutch coastline is informing policy and supporting
  the protection of this ecosystem."
ce_item_5: "Participate in a dynamic session with the possibility to win some striking research images made by the researchers at UU Plants."

ce_download_flyer: "Download flyer"

ce_participation_text: "This event is free. To register, please share your insights on any of the topics discussed in the posters. 
  Upon registration, you will receive an invitation by email for the closing event within a few days before the closing event."
ce_participation_text2: "This invitation will also include a pass to visit the Botanic Gardens during the closing event for free!"
