intro_text_1: "Fascination of Plants Day is celebrated worldwide biannually on the 18th of May. We take this day to share our research and our excitement for plants. At Utrecht University we began celebrating this day on 2024, and we continue to do so on 2026."
intro_text_2: "This website brings together both editions of the exhibition. Here you will find posters, projects, and contributions from researchers working across plant science. Explore the exhibitions below."
intro_text_3: "Enjoy!"



exh2024_title: "Exhibition 2024 | The Secret Superpowers of Plants"
exh2024_description: "This exhibition, created for Fascination of Plants Day, invites children to discover the hidden world of 
  plant survival through the eyes of real scientists at Utrecht University. 
  Using fun, relatable metaphors, the exhibition explains how plants deal with the big challenges of climate change, such as extreme heat and flooding. 
  Visitors learn that plants aren't just sitting still, they are active survivors with amazing 'superpowers'. 
  Through interactive challenges such as holding your breath or finding a favourite vegetable, the exhibition makes plant research easy and exciting for the next generation of scientists."

exhibition_button: "Go to exhibition"

exh2024_poster1_title: "Plants from the Future"
exh2024_poster1_quote: "To have enough food for everyone in the future, we want to make stonger crops that can survive climate change."

exh2024_poster2_title: "Walls Against Drought"
exh2024_poster2_quote: "Plants came up with a smart little trick to prevent dehydration: walls of cork! By building these walls, plants make sure that they maintain their water levels."

exh2024_poster3_title: "Underwater"
exh2024_poster3_quote: "When submerged, some plants speed up leaf growth to emerge out of the water. With these 'snorkels', they still can breathe."

exh2024_poster4_title: "Friends and Foes"
exh2024_poster4_quote: "When the plant is under attack by foes, the plant calls in their underground friends for help!"



exh2026_title: "Exhibition 2026 | Honest Conversations with Scientists"
exh2026_description1: "Plants are everywhere. They feed us, sustain ecosystems, and shape the world we live in. Yet plant research tends to happen quietly behind laboratory doors, and we, the plant researchers, don’t often share it with the public. Why?
  Does it have to do with the type of research? With the public’s perception? Or maybe it is more complex? It certainly seems to be. Moreover, the main aim of plant research is to fulfil the goal of generating knowledge."
exh2026_description2: "Can plant research also have other purposes?"
exh2026_description3: "Below you can see the same eight posters that you have in front of you, but in the Dutch language. 
  As you read through the exhibition, ponder if you share the same opinions, and don't hesitate to share your thoughts"
exh2026_participate: "here."

exh2026_poster1_title: "Part 1 - The student perspective"
exh2026_poster1_quote: "I think people enjoy themselves more during science communication activities if they are more interactive."

exh2026_poster2_title: "Part 2 - Can we make plant research accessible to all publics?"
exh2026_poster2_quote: "I like to find analogies that connect every-day things to my research to help explain it to different publics"

exh2026_poster3_title: "Part 3 - How can science help people embrace new technologies?"
exh2026_poster3_quote: "Sharing what’s possible from a scientific perspective and in turn hearing people’s perspective is part of science’s role in society."

exh2026_poster4_title: "Part 4 - Can plant research have an impact on gender imbalances?"
exh2026_poster4_quote: "In reality, the most immediate value of research is often scientific and personal development of the researcher"

exh2026_poster5_title: "Part 5 - Can researchers have an impact on student’s future careers?"
exh2026_poster5_quote: "The biggest impact that I have had with my career is the people who I’ve trained"

exh2026_poster6_title: "Part 6 - How do research and industry work together?"
exh2026_poster6_quote: "It is important to work with companies to make sure that our knowledge eventually benefits the growers."

exh2026_poster7_title: "Part 7 - Who is responsible for communicating science to the public?"
exh2026_poster7_quote: "As scientists, we have a big responsibility to speak out about how important it is to invest in new technologies that make us less reliant on fertilizers and pesticides."

exh2026_poster8_title: "Part 8 - The PhD perspective"
exh2026_poster8_quote: "We should not oversimplify our research for the general public. Instead, it is about giving people the tools and the language to think with you"

