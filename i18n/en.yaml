form_title: "What do you think?"
form_intro_1: "The posters in this exhibition present the perspectives of 9 researchers 
  (from MSc students to Professors) on science communication related to their own fields of study within plant sciences."
form_intro_2: "We invite you to respond to the topics exposed by our researchers with your own perspective, reflection, or question. 
  Your input helps create a shared space for discussion between the researchers' and the public's experience."

form_disclaimer_1: "By submitting your email address, you agree to receive a one-time reminder about the closing event."
form_disclaimer_2: "Your name, email, and response will only be used for this purpose. There's no need to register your real or full name, a nickname is enough."
form_disclaimer_3: "No data will be stored beyond the scope of this project."

