intro_text_1: "Fascination of Plants Day is celebrated worldwide biannually on the 18th of May. We take this day to share our research and our excitement for plants. At Utrecht University we began celebrating this day on 2024, and we continue to do so on 2026."
intro_text_2: "This website brings together both editions of the exhibition. Here you will find posters, projects, and contributions from researchers working across plant science. Explore the exhibitions below."
intro_text_3: "Enjoy!"



exh2024_title: "The Secret Superpowers of Plants"
exh2024_description: "This exhibition, created for Fascination of Plants Day, invites children to discover the hidden world of plant survival through the eyes of real scientists at Utrecht University. 
  Using fun, relatable metaphors, the exhibition explains how plants deal with the big challenges of climate change, such as extreme heat and flooding. Visitors learn that plants aren't just sitting still—they are active survivors with amazing 'superpowers'. 
  Through interactive challenges—such as holding your breath or finding a favourite vegetable—the exhibition makes complex biotechnology and plant-microbe interactions easy and exciting for the next generation of scientists."

exhibition_button: "Go to exhibition"

exh2024_poster1_title: "Plants from the Future"
exh2024_poster1_quote: "We are improving crops so they can combat foes, hold their breath underwater and build walls against drought."

exh2024_poster2_title: "Walls Against Drought"
exh2024_poster2_quote: "Plants came up with a smart little trick to prevent dehydration: walls of cork!"

exh2024_poster3_title: "Underwater"
exh2024_poster3_quote: "When submerged, some plants speed up leaf growth to emerge out of the water. With these 'snorkels', they still can breathe."

exh2024_poster4_title: "Friends and Foes"
exh2024_poster4_quote: "When the plant is under attack by foes, the plant calls in their underground friends for help!"



exh2026_title: "Honest Conversations with Scientists"
exh2026_description: "Plants are everywhere. They feed us, sustain ecosystems, and shape the world we live in. Yet plant research tends to happen quietly behind laboratory doors, and we, the plant researchers, don’t often share it with the public. Why?
  Does it have to do with the type of research? With the public’s perception? Or maybe it is more complex? It certainly seems to be. Moreover, the main aim of plant research is to fulfil the goal of generating knowledge. Can plant research also have other purposes?
  In these eight posters, you can look at some of Utrecht University’s researchers’ and students’ answers to these questions. As you read through the exhibition, ponder if you share the same opinions.
  Enjoy the exhibition."

exh2026_poster1_title: "Growing Tomatoes Without the Plant"
exh2026_poster1_quote: "This is our version of lab-grown meat, but for tomatoes."

exh2026_poster2_title: "Computational Modeling of Smart Plant Decisions"
exh2026_poster2_quote: "I want to show with my research that plants, which have no brains, can make smart decisions."

exh2026_poster3_title: "Cellular Programming and Patterning in Plants"
exh2026_poster3_quote: "Once we understand the programming, we will add our own programs to the code."

exh2026_poster4_title: "Strengthening Roots Against Drought and Parasites"
exh2026_poster4_quote: "My work on witchweed-resistant sorghum can improve the lives of many farmers."

exh2026_poster5_title: "The Evolution of Protective Root Barriers"
exh2026_poster5_quote: "In principle, my research is simple to explain: plants with stronger roots are better able to withstand drought."

exh2026_poster6_title: "Plant Resilience Against Infections and Disease"
exh2026_poster6_quote: "By presenting everything too simplistically, we risk losing those who are genuinely interested in a deeper understanding of botany."

exh2026_poster7_title: "Plant Responses to Environmental Water Stress"
exh2026_poster7_quote: "As scientists we have a great responsibility to speak out about how important it is to invest in new technologies."

exh2026_poster8_title: "Cellular Communication in Roots During Flooding"
exh2026_poster8_quote: "I want to know what happens at the cellular level in the root during flooding... and how they communicate with each other under these conditions."
