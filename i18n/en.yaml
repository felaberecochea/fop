ce_title: "Current exhibition"
ce_intro1: |
  The 2026 exhibition will be available from 15 May to 15 June 2026.
  On 12 May, a closing event will take place in the Botanic Gardens at Utrecht University (see full address below).
  The closing event brings together the ideas, questions, and perspectives explored throughout the exhibition.
  It is a moment to reflect on how plant science connects to society, and how researchers and the public can engage more openly with each other.

ce_intro2: "This event is free and open to the public, so please feel free to join us and bring your friends and family!"
ce_intro3: "During the event, visitors will have the opportunity to:"

ce_item_1: "Meet researchers, discuss the themes presented in the posters."
ce_item_2: "explore how plant science contributes to addressing global challenges such as climate change, food security, and sustainability."
ce_item_3: "Participate in a dynamic session with the possibility to win house-made art!"

