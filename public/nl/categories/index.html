<!DOCTYPE html>
<html lang="nl">
<head><script src="/livereload.js?mindelay=10&amp;v=2&amp;port=64565&amp;path=livereload" data-no-instant defer></script>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/css/main.css">
</head>

<body>

  <header class="site-header">

  <div class="header-top">
    <div class="language-switcher">
      
        <a href="/en" class="lang-btn ">
          EN
        </a>
      
        <a href="/nl" class="lang-btn active">
          NL
        </a>
      
    </div>
    
    <h1 class="site-title">
      <a href="/nl/">Fascination of Plants</a>
      
    </h1>

    <button class="menu-toggle">☰</button>

  </div>

  <nav id="sidebar" class="sidebar">
    <button class="sidebar-close" aria-label="Close menu">✕</button>
    <ul>
      
        <li>

          
            <a href="/nl/">Home</a>
          

          

        </li>
      
        <li>

          
            <span>Exhibitions</span>
          

          
            <ul>
              
                <li>
                  <a href="/nl/exhibitions/2024/">Exhibition 2024</a>
                </li>
              
                <li>
                  <a href="/nl/exhibitions/2026/">Exhibition 2026</a>
                </li>
              
            </ul>
          

        </li>
      
        <li>

          
            <span>Current exhibition</span>
          

          
            <ul>
              
                <li>
                  <a href="/nl/closing-event/">Closing event 2026</a>

                <li>

            </ul>

    </ul>
  </nav>

</header>
  

  


  <footer class="site-footer">

  <div class="footer-logos">
    <img src="/logos/logo1.svg" alt="Logo 1">
    <img src="/logos/logo2.svg" alt="Logo 2">
    <img src="/logos/logo3.svg" alt="Logo 3">
    <img src="/logos/logo4.svg" alt="Logo 4">
  </div>

  <p class="footer-text">
    © 2026 Fascination of Plants
  </p>

</footer>

<script>
document.addEventListener("DOMContentLoaded", function () {
  const btn = document.querySelector(".menu-toggle");
  const closeBtn = document.querySelector(".sidebar-close");
  const sidebar = document.getElementById("sidebar");

  if (!btn || !sidebar) return;

  btn.addEventListener("click", function () {
    sidebar.classList.toggle("open");
  });

  if (closeBtn) {
    closeBtn.addEventListener("click", function () {
      sidebar.classList.remove("open");
    });
  }
});
</script>

</body>
</html>
