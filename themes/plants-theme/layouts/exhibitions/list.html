{{ define "main" }}
<main class="site-content">

  {{ .Content }}
  <p>{{ i18n "exhibition2026_intro" }}</p>
  <p class="poster-note">
    Click on any poster to view or download the full version.
  </p>

  {{ if eq .Params.year "2024" }}
    {{ partial "posters-2024.html" . }}
  {{ else if eq .Params.year "2026" }}
    {{ partial "posters-2026.html" . }}
  {{ end }}

</main>
{{ end }}
