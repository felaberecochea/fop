{{ define "main" }}

<div class="form-intro">
  <div class="form-intro-text">
    <h2>{{ i18n "form_title" }}</h2>
    <p class="intro-lead">
      {{ i18n "form_intro_1" }}
    </p>
    <p>
      {{ i18n "form_intro_2" }}
    </p>
  </div>

  <div class="form-intro-image">
    <img src="{{ "img/form-intro.svg" | relURL }}" alt="Exhibition illustration">
  </div>
</div>

<section class="form-section">

  {{ .Content }}

  <form action="https://formspree.io/f/mdaygneg" method="POST">
    <label>{{ i18n "name" }}</label>
    <input type="text" name="name" required>

    <label>{{ i18n "email" }}</label>
    <input type="email" name="email" required>

    <label>{{ i18n "answer" }}</label>
    <textarea name="answer" rows="5" required></textarea>

    <button type="submit">{{ i18n "submit" }}</button>
  </form>

  <div class="form-disclaimer">
    <p>{{ i18n "form_disclaimer_1" }}</p>
    <p>{{ i18n "form_disclaimer_2" }}</p>
    <p>{{ i18n "form_disclaimer_3" }}</p>
  </div>

</section>

{{ end }}
